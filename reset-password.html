<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ছায়াবর্তী - পাসওয়ার্ড রিসেট</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fb-blue: #1877f2;
            --fb-bg: #f0f2f5;
            --dark-bg: #18191a;
            --card-white: #ffffff;
            --text-dark: #1c1e21;
            --text-light: #e4e6eb;
            --border-light: #e4e6eb;
            --success: #23a55a;
            --danger: #e41e3f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Siyam Rupali', sans-serif;
            background: var(--fb-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--text-light);
        }

        .reset-container {
            max-width: 450px;
            width: 90%;
            margin: 40px auto;
        }

        .reset-card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.1);
        }

        body.dark-mode .reset-card {
            background: #1e1f22;
        }

        .logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #65676b;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--fb-bg);
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--fb-blue);
        }

        body.dark-mode .form-group input {
            background: #2b2d31;
            border-color: #3e4042;
            color: var(--text-light);
        }

        .reset-btn {
            width: 100%;
            background: var(--fb-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .reset-btn:hover {
            opacity: 0.9;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: var(--fb-blue);
            text-decoration: none;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeInOut 3s ease;
        }
        .toast.error {
            background: var(--danger);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="logo">🔐</div>
            <h1>পাসওয়ার্ড রিসেট</h1>
            <div class="subtitle">আপনার ইমেইলে রিসেট লিংক পাঠানো হবে</div>

            <form id="resetForm">
                <div class="form-group">
                    <label>ইমেইল ঠিকানা</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="reset-btn">📧 রিসেট লিংক পাঠান</button>
            </form>

            <div class="back-link">
                <a onclick="goToLogin()">← লগইন পেজে ফিরুন</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7",
            measurementId: "G-BQBWVRRQPH"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showToast(msg, isErr = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isErr ? ' error' : '');
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if(saved === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            
            if(!email) {
                showToast("❌ ইমেইল দিন!", true);
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                showToast("✅ পাসওয়ার্ড রিসেট লিংক পাঠানো হয়েছে! আপনার ইমেইল চেক করুন।");
                document.getElementById('email').value = '';
            } catch (error) {
                console.error(error);
                let errorMessage = "রিসেট লিংক পাঠাতে ব্যর্থ!";
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = "❌ এই ইমেইলে কোনো অ্যাকাউন্ট নেই!";
                        break;
                    case 'auth/invalid-email':
                        errorMessage = "❌ সঠিক ইমেইল দিন!";
                        break;
                    default:
                        errorMessage = `❌ ${error.message}`;
                }
                showToast(errorMessage, true);
            }
        });
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        
        initTheme();
        console.log("🔑 পাসওয়ার্ড রিসেট পেজ রেডি!");
    </script>
</body>
</html>
