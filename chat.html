<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>চ্যাট - ছায়াবর্তী</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0e1621;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* নেভিগেশন */
        .navbar {
            background: #17212b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #242f3d;
        }
        
        .back-btn {
            color: #6ab0f3;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .user-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .user-name {
            font-weight: 500;
        }
        
        .user-status {
            font-size: 0.7rem;
            color: #6ab0f3;
        }
        
        /* চ্যাট এরিয়া */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        /* মেসেজ স্টাইল - টেলিগ্রামের মতো */
        .message {
            display: flex;
            max-width: 80%;
            margin-bottom: 5px;
        }
        
        .message.sent {
            align-self: flex-end;
            justify-content: flex-end;
        }
        
        .message.received {
            align-self: flex-start;
        }
        
        .message-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 100%;
            word-wrap: break-word;
        }
        
        .message.sent .message-bubble {
            background: #2b5278;
            border-bottom-right-radius: 4px;
        }
        
        .message.received .message-bubble {
            background: #17212b;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 0.6rem;
            color: #7e8c9e;
            margin-top: 4px;
            text-align: right;
        }
        
        .message.sent .message-time {
            text-align: right;
        }
        
        .message.received .message-time {
            text-align: left;
        }
        
        .message-sender {
            font-size: 0.7rem;
            font-weight: 500;
            margin-bottom: 2px;
            color: #6ab0f3;
        }
        
        /* ইনপুট এরিয়া */
        .input-area {
            background: #17212b;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #242f3d;
        }
        
        .message-input {
            flex: 1;
            background: #242f3d;
            border: none;
            border-radius: 25px;
            padding: 10px 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        
        .message-input::placeholder {
            color: #7e8c9e;
        }
        
        .send-btn {
            background: #2b5278;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
        }
        
        .send-btn:hover {
            background: #3a6b9c;
        }
        
        /* ইউজার লিস্ট সাইডবার */
        .chat-layout {
            display: flex;
            height: 100%;
        }
        
        .user-list {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #242f3d;
            overflow-y: auto;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .user-list-header {
            padding: 16px;
            border-bottom: 1px solid #242f3d;
            font-weight: bold;
        }
        
        .user-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .user-list-item:hover {
            background: #242f3d;
        }
        
        .user-list-item.active {
            background: #2b5278;
        }
        
        .user-list-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2b5278;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .user-list-info {
            flex: 1;
        }
        
        .user-list-name {
            font-weight: 500;
        }
        
        .user-list-last {
            font-size: 0.7rem;
            color: #7e8c9e;
        }
        
        .no-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #7e8c9e;
            text-align: center;
            padding: 20px;
        }
        
        @media (max-width: 700px) {
            .user-list {
                width: 100%;
                position: absolute;
                z-index: 10;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .user-list.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
        }
        
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #23a55a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeOut 3s ease;
        }
        .toast.error { background: #e41e3f; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="chat-layout">
        <!-- ইউজার লিস্ট -->
        <div class="user-list" id="userList">
            <div class="user-list-header">
                👥 মেসেজ
                <button class="menu-toggle" id="closeMenu" style="float:right; background:none; border:none; color:white;">✕</button>
            </div>
            <div id="usersContainer"></div>
        </div>
        
        <!-- চ্যাট মেইন -->
        <div class="chat-main">
            <div class="navbar">
                <button class="menu-toggle" id="openMenu" style="background:none; border:none; color:white; font-size:1.2rem;">☰</button>
                <div class="user-info" id="chatHeader">
                    <div class="chat-avatar">?</div>
                    <div>
                        <div class="user-name" id="chatUserName">নির্বাচন করুন</div>
                        <div class="user-status" id="chatUserStatus">অনলাইন</div>
                    </div>
                </div>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <div class="no-chat">
                    💬 বাম দিক থেকে একজন ইউজার সিলেক্ট করুন<br>
                    মেসেজ শুরু করুন
                </div>
            </div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" class="message-input" id="messageInput" placeholder="মেসেজ লিখুন...">
                <button class="send-btn" id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let selectedUser = null;
        let users = [];
        
        function getAvatarLetter(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }
        
        function showToast(msg, isErr = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isErr ? ' error' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
        }
        
        // ইউজার লিস্ট লোড
        function loadUsers() {
            db.ref('users').on('value', (snapshot) => {
                users = [];
                snapshot.forEach((child) => {
                    const user = child.val();
                    if (child.key !== currentUser.uid) {
                        users.push({
                            uid: child.key,
                            name: user.name || user.email.split('@')[0],
                            email: user.email,
                            avatar: user.avatarUrl,
                            status: user.status || 'অনলাইন'
                        });
                    }
                });
                
                const container = document.getElementById('usersContainer');
                container.innerHTML = users.map(user => `
                    <div class="user-list-item" onclick="selectUser('${user.uid}', '${escapeHtml(user.name)}', '${user.avatar || ''}')">
                        <div class="user-list-avatar" style="${user.avatar ? `background-image:url('${user.avatar}'); background-size:cover;` : ''}">
                            ${!user.avatar ? getAvatarLetter(user.name) : ''}
                        </div>
                        <div class="user-list-info">
                            <div class="user-list-name">${escapeHtml(user.name)}</div>
                            <div class="user-list-last">${user.status}</div>
                        </div>
                    </div>
                `).join('');
            });
        }
        
        // মেসেজ লোড
        function loadMessages(chatId) {
            const container = document.getElementById('chatContainer');
            const messagesRef = db.ref(`chats/${chatId}/messages`);
            
            messagesRef.orderByChild('timestamp').on('value', (snapshot) => {
                if (!snapshot.exists()) {
                    container.innerHTML = '<div class="no-chat">💬 কোন মেসেজ নেই। প্রথম মেসেজ পাঠান!</div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach((child) => {
                    const msg = child.val();
                    const isSent = msg.senderId === currentUser.uid;
                    
                    html += `
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            <div class="message-bubble">
                                ${!isSent ? `<div class="message-sender">${escapeHtml(msg.senderName)}</div>` : ''}
                                <div>${escapeHtml(msg.text)}</div>
                                <div class="message-time">${formatTime(msg.timestamp)}</div>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        }
        
        // ইউজার সিলেক্ট
        window.selectUser = function(uid, name, avatar) {
            selectedUser = { uid, name, avatar };
            
            document.getElementById('chatUserName').innerText = name;
            document.getElementById('chatUserStatus').innerText = 'অনলাইন';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatHeader').querySelector('.chat-avatar').innerHTML = avatar ? '' : getAvatarLetter(name);
            if (avatar) {
                document.getElementById('chatHeader').querySelector('.chat-avatar').style.backgroundImage = `url('${avatar}')`;
                document.getElementById('chatHeader').querySelector('.chat-avatar').style.backgroundSize = 'cover';
            }
            
            const chatId = [currentUser.uid, uid].sort().join('_');
            loadMessages(chatId);
            
            // মোবাইলে ইউজার লিস্ট বন্ধ
            if (window.innerWidth < 700) {
                document.getElementById('userList').classList.remove('open');
            }
        };
        
        // মেসেজ পাঠান
        async function sendMessage() {
            if (!selectedUser) {
                showToast("একজন ইউজার সিলেক্ট করুন!", true);
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const chatId = [currentUser.uid, selectedUser.uid].sort().join('_');
            const messageRef = db.ref(`chats/${chatId}/messages`).push();
            
            await messageRef.set({
                senderId: currentUser.uid,
                senderName: currentUser.displayName || currentUser.email.split('@')[0],
                receiverId: selectedUser.uid,
                text: text,
                timestamp: Date.now(),
                read: false
            });
            
            // শেষ মেসেজ আপডেট
            await db.ref(`chats/${chatId}/lastMessage`).set({
                text: text,
                timestamp: Date.now(),
                senderId: currentUser.uid
            });
            
            input.value = '';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }
        
        // এন্টার প্রেস
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        
        // মোবাইল মেনু
        document.getElementById('openMenu')?.addEventListener('click', () => {
            document.getElementById('userList').classList.add('open');
        });
        document.getElementById('closeMenu')?.addEventListener('click', () => {
            document.getElementById('userList').classList.remove('open');
        });
        
        // অথেন্টিকেশন
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadUsers();
            } else {
                showToast("চ্যাট করতে লগইন করুন!", true);
                setTimeout(() => location.href = 'login.html', 1500);
            }
        });
    </script>
</body>
</html>
