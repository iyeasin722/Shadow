<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাঠক - ছায়াবর্তী</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Siyam Rupali', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(0,0,0,0.9);
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }
        .logo h2 { color: #ffd700; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .story-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .story-title { font-size: 1.2rem; color: #ffd700; }
        .story-meta { font-size: 0.8rem; color: #aaa; margin: 8px 0; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            max-width: 600px;
            margin: 20px auto;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
        }
        .close { float: right; font-size: 1.5rem; cursor: pointer; }
        .story-content { white-space: pre-wrap; line-height: 1.6; margin: 15px 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><h2>📖 পাঠক</h2></div>
        <a href="index.html" style="color:#ffd700;">← ফিরুন</a>
    </nav>
    <div class="container" id="storiesList"></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">✕</span>
            <h2 id="modalTitle"></h2>
            <div class="story-content" id="modalContent"></div>
        </div>
    </div>
    <script>
        function loadStories() {
            const stories = JSON.parse(localStorage.getItem('published_stories') || '[]');
            const container = document.getElementById('storiesList');
            if(stories.length===0) {
                container.innerHTML = '<p style="text-align:center;">কোনো গল্প নেই। প্রথম গল্প লিখুন!</p>';
                return;
            }
            container.innerHTML = stories.map(s => `
                <div class="story-card" onclick="openStory(${s.id})">
                    <div class="story-title">${s.title}</div>
                    <div class="story-meta">✍️ ${s.author} | 📄 ${s.pages} পৃষ্ঠা | ❤️ ${s.likes||0}</div>
                    <div>${s.excerpt || s.content.substring(0,100)}...</div>
                </div>
            `).join('');
        }
        function openStory(id) {
            const stories = JSON.parse(localStorage.getItem('published_stories') || '[]');
            const story = stories.find(s => s.id === id);
            if(story) {
                document.getElementById('modalTitle').innerHTML = story.title;
                document.getElementById('modalContent').innerHTML = story.content.replace(/\n/g, '<br>');
                document.getElementById('modal').style.display = 'block';
            }
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        loadStories();
    </script>
</body>
</html>
