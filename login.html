<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ছায়াবর্তী - লগইন</title>
    <!-- Firebase SDKs - শুধু প্রয়োজনীয়গুলো -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fb-blue: #1877f2;
            --fb-bg: #f0f2f5;
            --telegram-blue: #229ed9;
            --discord-blurple: #5865f2;
            --twitter-blue: #1da1f2;
            --dark-bg: #18191a;
            --card-white: #ffffff;
            --text-dark: #1c1e21;
            --text-light: #e4e6eb;
            --border-light: #e4e6eb;
            --danger: #e41e3f;
            --success: #23a55a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Siyam Rupali', sans-serif;
            background: var(--fb-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--text-light);
        }

        .login-container {
            max-width: 450px;
            width: 90%;
            margin: 40px auto;
        }

        .login-card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.1);
        }

        body.dark-mode .login-card {
            background: #1e1f22;
        }

        .logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--fb-blue), var(--twitter-blue), var(--telegram-blue), var(--discord-blurple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #65676b;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--fb-bg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--fb-blue);
        }

        body.dark-mode .form-group input {
            background: #2b2d31;
            border-color: #3e4042;
            color: var(--text-light);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }
        .forgot-password a {
            color: var(--fb-blue);
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            background: var(--fb-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .register-link a {
            color: var(--fb-blue);
            text-decoration: none;
            cursor: pointer;
        }
        .register-link a:hover {
            text-decoration: underline;
        }

        .demo-login {
            margin-top: 20px;
            text-align: center;
        }
        .demo-btn {
            background: var(--discord-blurple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeInOut 3s ease;
        }
        .toast.error {
            background: var(--danger);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">📖</div>
            <h1>ছায়াবর্তী</h1>
            <div class="subtitle">আপনার অ্যাকাউন্টে লগইন করুন</div>

            <form id="loginForm">
                <div class="form-group">
                    <label>ইমেইল</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
                </div>

                <div class="forgot-password">
                    <a onclick="goToResetPassword()">পাসওয়ার্ড ভুলে গেছেন?</a>
                </div>

                <button type="submit" class="login-btn">🔐 লগইন করুন</button>
            </form>

            <div class="demo-login">
                <button class="demo-btn" id="demoLoginBtn">🎭 ডেমো অ্যাকাউন্টে লগইন</button>
            </div>

            <div class="register-link">
                অ্যাকাউন্ট নেই? <a onclick="goToRegister()">সাইনআপ করুন</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7",
            measurementId: "G-BQBWVRRQPH"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        function showToast(msg, isErr = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isErr ? ' error' : '');
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if(saved === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        async function loginUser(email, password) {
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // ইউজারের তথ্য ডাটাবেস থেকে নিন
                const snapshot = await database.ref(`users/${user.uid}`).once('value');
                const userData = snapshot.val() || {};
                
                // লোকাল স্টোরেজে সংরক্ষণ করুন
                const loginData = {
                    uid: user.uid,
                    name: user.displayName || userData.name || email.split('@')[0],
                    email: user.email,
                    role: userData.role || 'user',
                    photoURL: user.photoURL
                };
                localStorage.setItem('currentUser', JSON.stringify(loginData));
                
                return { success: true };
            } catch (error) {
                console.error("Login error:", error);
                let errorMessage = "লগইন ব্যর্থ!";
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = "❌ এই ইমেইলে কোনো অ্যাকাউন্ট নেই!";
                        break;
                    case 'auth/wrong-password':
                        errorMessage = "❌ পাসওয়ার্ড ভুল!";
                        break;
                    case 'auth/invalid-email':
                        errorMessage = "❌ সঠিক ইমেইল দিন!";
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = "❌ অনেক বার চেষ্টা করেছেন! পরে আবার চেষ্টা করুন।";
                        break;
                    default:
                        errorMessage = `❌ ${error.message}`;
                }
                
                return { success: false, error: errorMessage };
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if(!email) {
                showToast("❌ ইমেইল দিন!", true);
                return;
            }
            if(!password) {
                showToast("❌ পাসওয়ার্ড দিন!", true);
                return;
            }
            
            const result = await loginUser(email, password);
            
            if(result.success) {
                showToast("✅ লগইন সফল! স্বাগতম!");
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showToast(result.error, true);
            }
        });
        
        async function demoLogin() {
            try {
                // ডেমো ইউজার তৈরি করুন যদি না থাকে
                const demoEmail = "demo@shadowverse.com";
                const demoPassword = "demo123456";
                
                try {
                    await auth.signInWithEmailAndPassword(demoEmail, demoPassword);
                } catch (error) {
                    if (error.code === 'auth/user-not-found') {
                        // ইউজার না থাকলে তৈরি করুন
                        const userCredential = await auth.createUserWithEmailAndPassword(demoEmail, demoPassword);
                        await userCredential.user.updateProfile({ displayName: "ডেমো ইউজার" });
                        await database.ref(`users/${userCredential.user.uid}`).set({
                            name: "ডেমো ইউজার",
                            email: demoEmail,
                            uid: userCredential.user.uid,
                            joinedAt: Date.now(),
                            role: 'user',
                            isPremium: false
                        });
                        await auth.signInWithEmailAndPassword(demoEmail, demoPassword);
                    } else {
                        throw error;
                    }
                }
                
                const user = auth.currentUser;
                const loginData = {
                    uid: user.uid,
                    name: user.displayName || "ডেমো ইউজার",
                    email: user.email,
                    role: 'user'
                };
                localStorage.setItem('currentUser', JSON.stringify(loginData));
                showToast("✅ ডেমো অ্যাকাউন্টে লগইন সফল!");
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showToast("ডেমো লগইন ব্যর্থ: " + error.message, true);
            }
        }
        
        function goToRegister() {
            window.location.href = 'register.html';
        }
        
        function goToResetPassword() {
            window.location.href = 'reset-password.html';
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        
        document.getElementById('demoLoginBtn')?.addEventListener('click', demoLogin);
        
        initTheme();
        console.log("🔐 লগইন পেজ রেডি!");
    </script>
</body>
</html>
