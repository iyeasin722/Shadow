<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ছায়াবর্তী - অ্যাডমিন প্যানেল</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --fb-blue: #1877f2;
            --fb-bg: #f0f2f5;
            --dark-bg: #18191a;
            --card-white: #ffffff;
            --text-dark: #1c1e21;
            --text-light: #e4e6eb;
            --border-light: #e4e6eb;
            --success: #23a55a;
            --danger: #e41e3f;
            --warning: #f39c12;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--fb-bg);
            color: var(--text-dark);
        }
        body.dark-mode { background: var(--dark-bg); color: var(--text-light); }
        
        .navbar {
            background: var(--card-white);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
        }
        body.dark-mode .navbar { background: #1e1f22; }
        .nav-container { max-width: 1400px; margin: 0 auto; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #1877f2, #1da1f2, #229ed9, #5865f2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .admin-badge { 
            background: var(--fb-blue);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .nav-icons { display: flex; gap: 8px; align-items: center; }
        .nav-icon { padding: 8px 14px; border-radius: 8px; cursor: pointer; color: #65676b; font-size: 1.2rem; }
        .nav-icon:hover { background: var(--fb-bg); }
        .profile-section { display: flex; align-items: center; gap: 12px; position: relative; }
        .profile-avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #5865f2;
            display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-weight: bold;
        }
        
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .admin-header {
            background: linear-gradient(135deg, #1877f2, #5865f2);
            border-radius: 20px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
        }
        .admin-header h1 { font-size: 2rem; margin-bottom: 8px; }
        .admin-header p { opacity: 0.9; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-white);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        body.dark-mode .stat-card { background: #1e1f22; }
        .stat-number { font-size: 2rem; font-weight: bold; color: var(--fb-blue); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 24px;
            background: var(--card-white);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        body.dark-mode .tab-btn { background: #1e1f22; color: var(--text-light); }
        .tab-btn.active { background: var(--fb-blue); color: white; }
        
        .admin-table {
            background: var(--card-white);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
        }
        body.dark-mode .admin-table { background: #1e1f22; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
        .action-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            margin: 0 4px;
        }
        .delete-btn { background: var(--danger); color: white; }
        .verify-btn { background: var(--success); color: white; }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: var(--fb-bg);
        }
        .pending-item {
            background: var(--fb-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeOut 3s ease;
        }
        .toast.error { background: var(--danger); }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">📖 ছায়াবর্তী</div>
            <div class="nav-icons">
                <div class="nav-icon" onclick="location.href='index.html'">🏠</div>
                <div class="nav-icon" id="themeToggle">🌙</div>
                <span class="admin-badge" id="adminBadge">🛡️ অ্যাডমিন</span>
            </div>
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar">?</div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-header">
            <h1>🛡️ অ্যাডমিন প্যানেল</h1>
            <p>গল্প ও মন্তব্য ব্যবস্থাপনা | টাকা ভেরিফিকেশন</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="storyCount">0</div><div>মোট গল্প</div></div>
            <div class="stat-card"><div class="stat-number" id="commentCount">0</div><div>মোট মন্তব্য</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>pending টাকা</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="stories">📖 গল্প</button>
            <button class="tab-btn" data-tab="comments">💬 মন্তব্য</button>
            <button class="tab-btn" data-tab="pending">💰 pending টাকা</button>
            <button class="tab-btn" data-tab="search">🔍 TXID সার্চ</button>
        </div>

        <div id="storiesTab" class="admin-table"><div id="storiesList">লোড হচ্ছে...</div></div>
        <div id="commentsTab" class="admin-table" style="display:none;"><div id="commentsList">লোড হচ্ছে...</div></div>
        <div id="pendingTab" class="admin-table" style="display:none;"><div id="pendingList">লোড হচ্ছে...</div></div>
        <div id="searchTab" class="admin-table" style="display:none;">
            <div class="search-box">
                <input type="text" id="searchTXID" class="search-input" placeholder="TXID লিখুন...">
                <input type="text" id="searchMobile" class="search-input" placeholder="মোবাইল নাম্বার...">
                <button class="action-btn verify-btn" onclick="searchTransaction()">🔍 সার্চ করুন</button>
            </div>
            <div id="searchResult"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;

        function showToast(msg, isErr = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isErr ? ' error' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getInitial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }
        function formatDate(ts) { return ts ? new Date(ts).toLocaleString('bn-BD') : '-'; }
        function escapeHtml(t) { if (!t) return ''; return t.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

        // অ্যাডমিন চেক - শুধু অ্যাডমিন রোলের ইউজার
        function checkAdmin(user) {
            if (!user) return false;
            // ওনারদের ইমেইল (এরা অ্যাডমিন প্যানেলেও ঢুকতে পারবে)
            const ownerEmails = ['iyeasin722@gmail.com', 'iyeasin722@yahoo.com', 'iyeasin@gmail.com'];
            if (ownerEmails.includes(user.email)) return true;
            
            // ডাটাবেস থেকে রোল চেক
            return db.ref(`users/${user.uid}/role`).once('value').then(snapshot => {
                return snapshot.val() === 'admin';
            });
        }

        async function syncCheckAdmin(user) {
            if (!user) return false;
            const ownerEmails = ['iyeasin722@gmail.com', 'iyeasin722@yahoo.com', 'iyeasin@gmail.com'];
            if (ownerEmails.includes(user.email)) return true;
            const snapshot = await db.ref(`users/${user.uid}/role`).once('value');
            return snapshot.val() === 'admin';
        }

        function loadStats() {
            db.ref('stories').once('value', s => document.getElementById('storyCount').innerText = s.numChildren());
            db.ref('pending_transactions').once('value', s => document.getElementById('pendingCount').innerText = s.numChildren());
            
            let totalComments = 0;
            db.ref('stories').once('value', (snapshot) => {
                snapshot.forEach(story => {
                    if (story.val().comments) totalComments += Object.keys(story.val().comments).length;
                });
                document.getElementById('commentCount').innerText = totalComments;
            });
        }

        function loadStories() {
            db.ref('stories').once('value', (snapshot) => {
                if (!snapshot.exists()) { document.getElementById('storiesList').innerHTML = '<div>কোনো গল্প নেই</div>'; return; }
                let html = ' <thead> <th>শিরোনাম</th><th>লেখক</th><th>লাইক</th><th>মন্তব্য</th><th>তারিখ</th><th>অ্যাকশন</th> </thead><tbody>';
                snapshot.forEach(child => {
                    const s = child.val();
                    const commentCount = s.comments ? Object.keys(s.comments).length : 0;
                    html += ` <td>${escapeHtml(s.title)}</td><td>${escapeHtml(s.authorName)}</td><td>${s.likes || 0}</td><td>${commentCount}</td><td>${formatDate(s.timestamp)}</td>
                    <td><button class="action-btn delete-btn" onclick="deleteStory('${child.key}','${escapeHtml(s.title)}')">ডিলেট</button></td> `;
                });
                html += '</tbody>';
                document.getElementById('storiesList').innerHTML = html;
            });
        }

        function loadComments() {
            let allComments = [];
            db.ref('stories').once('value', (snapshot) => {
                snapshot.forEach(story => {
                    if (story.val().comments) {
                        Object.entries(story.val().comments).forEach(([id, c]) => {
                            allComments.push({ storyId: story.key, storyTitle: story.val().title, commentId: id, ...c });
                        });
                    }
                });
                if (allComments.length === 0) { document.getElementById('commentsList').innerHTML = '<div>কোনো মন্তব্য নেই</div>'; return; }
                let html = ' <thead> <th>মন্তব্য</th><th>লেখক</th><th>গল্প</th><th>তারিখ</th><th>অ্যাকশন</th> </thead><tbody>';
                allComments.forEach(c => {
                    html += ` <td>${escapeHtml(c.text)}</td><td>${escapeHtml(c.author)}</td><td>${escapeHtml(c.storyTitle)}</td><td>${formatDate(c.timestamp)}</td>
                    <td><button class="action-btn delete-btn" onclick="deleteComment('${c.storyId}','${c.commentId}')">ডিলেট</button></td> `;
                });
                html += '</tbody>';
                document.getElementById('commentsList').innerHTML = html;
            });
        }

        function loadPending() {
            db.ref('pending_transactions').once('value', (snapshot) => {
                if (!snapshot.exists()) { document.getElementById('pendingList').innerHTML = '<div>কোনো pending ট্রানজেকশন নেই</div>'; return; }
                let html = '';
                snapshot.forEach(child => {
                    const t = child.val();
                    html += `
                        <div class="pending-item">
                            <div><strong>${escapeHtml(t.userName)}</strong> (${t.userEmail})</div>
                            <div>💰 ${t.amount} টাকা | 📞 ${t.mobileNumber}</div>
                            <div>TXID: <strong>${t.txid}</strong> | 💳 ${t.paymentMethod}</div>
                            <div style="margin-top:8px;">
                                <button class="action-btn verify-btn" onclick="verifyTransaction('${child.key}','${t.userId}',${t.amount})">✅ ভেরিফাই</button>
                                <button class="action-btn delete-btn" onclick="rejectTransaction('${child.key}','${t.userId}')">❌ বাতিল</button>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('pendingList').innerHTML = html;
            });
        }

        window.verifyTransaction = async function(txId, userId, amount) {
            if (!confirm(`${amount} টাকা যোগ করতে চান?`)) return;
            const walletRef = db.ref(`users/${userId}/wallet`);
            await walletRef.transaction(current => ({ balance: (current?.balance || 0) + amount }));
            await db.ref(`pending_transactions/${txId}`).update({ status: 'completed', completedAt: Date.now(), verifiedBy: currentUser?.email });
            await db.ref(`transactions/${userId}/${txId}`).update({ status: 'completed', completedAt: Date.now() });
            showToast(`✅ ${amount} টাকা যোগ হয়েছে!`);
            loadPending();
            loadStats();
        };

        window.rejectTransaction = async function(txId, userId) {
            if (!confirm("ট্রানজেকশন বাতিল করতে চান?")) return;
            await db.ref(`pending_transactions/${txId}`).update({ status: 'failed', completedAt: Date.now() });
            await db.ref(`transactions/${userId}/${txId}`).update({ status: 'failed' });
            showToast("❌ ট্রানজেকশন বাতিল!");
            loadPending();
        };

        window.searchTransaction = async function() {
            const txid = document.getElementById('searchTXID').value.trim();
            const mobile = document.getElementById('searchMobile').value.trim();
            if (!txid && !mobile) { showToast("TXID বা মোবাইল দিন!", true); return; }
            const snapshot = await db.ref('pending_transactions').once('value');
            let found = [];
            snapshot.forEach(child => {
                const t = child.val();
                if ((txid && t.txid === txid) || (mobile && t.mobileNumber === mobile)) found.push({ id: child.key, ...t });
            });
            if (found.length === 0) { document.getElementById('searchResult').innerHTML = '<div>🔍 পাওয়া যায়নি</div>'; return; }
            document.getElementById('searchResult').innerHTML = found.map(t => `
                <div class="pending-item">
                    <div><strong>${escapeHtml(t.userName)}</strong> (${t.userEmail})</div>
                    <div>💰 ${t.amount} টাকা | 📞 ${t.mobileNumber}</div>
                    <div>TXID: <strong>${t.txid}</strong> | 💳 ${t.paymentMethod}</div>
                    <div>স্ট্যাটাস: ${t.status === 'pending' ? '⏳ pending' : '✅ সফল'}</div>
                    ${t.status === 'pending' ? `
                        <div style="margin-top:8px;">
                            <button class="action-btn verify-btn" onclick="verifyTransaction('${t.id}','${t.userId}',${t.amount})">✅ ভেরিফাই</button>
                            <button class="action-btn delete-btn" onclick="rejectTransaction('${t.id}','${t.userId}')">❌ বাতিল</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        };

        window.deleteStory = function(id, title) { if (confirm(`"${title}" ডিলেট করবেন?`)) db.ref(`stories/${id}`).remove().then(() => { loadStories(); loadStats(); }); };
        window.deleteComment = function(storyId, commentId) { db.ref(`stories/${storyId}/comments/${commentId}`).remove().then(() => { loadComments(); }); };

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.getAttribute('data-tab');
                document.querySelectorAll('.admin-table').forEach(t => t.style.display = 'none');
                document.getElementById(`${tab}Tab`).style.display = 'block';
                if (tab === 'stories') loadStories();
                else if (tab === 'comments') loadComments();
                else if (tab === 'pending') loadPending();
            });
        });

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeToggle').innerHTML = '☀️'; }
            else { document.getElementById('themeToggle').innerHTML = '🌙'; }
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }
        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);

        auth.onAuthStateChanged(async (user) => {
            if (user && await syncCheckAdmin(user)) {
                currentUser = user;
                document.getElementById('profileAvatar').textContent = getInitial(user.displayName || user.email);
                loadStats();
                loadStories();
            } else if (user) { showToast("❌ আপনার অ্যাডমিন অ্যাক্সেস নেই!", true); setTimeout(() => location.href = 'index.html', 1500); }
            else { showToast("❌ অ্যাডমিন প্যানেল দেখতে লগইন করুন!", true); setTimeout(() => location.href = 'login.html', 1500); }
        });

        initTheme();
        console.log("🛡️ অ্যাডমিন প্যানেল প্রস্তুত!");
    </script>
</body>
</html>
