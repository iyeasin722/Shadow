<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাসওয়ার্ড রিসেট - ছায়াবর্তী</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Siyam Rupali', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 35px;
            border: 1px solid #334155;
        }
        .card h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 10px;
        }
        .card p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #334155;
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .error-msg { background: #ef4444; color: white; }
        .success-msg { background: #22c55e; color: white; }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #ffd700;
            text-decoration: none;
            font-size: 0.8rem;
        }
        
        @media (max-width: 500px) {
            .card { padding: 25px; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🔑 পাসওয়ার্ড রিসেট</h2>
            <p>আপনার ইমেইলে রিসেট লিংক পাঠানো হবে</p>
            
            <div id="message" class="message"></div>
            
            <input type="email" id="resetEmail" placeholder="আপনার ইমেইল" value="iyeasin722@gmail.com">
            
            <button onclick="sendResetEmail()">📧 রিসেট লিংক পাঠান</button>
            
            <div class="back-link">
                <a href="login.html">← লগইন পেজে ফিরুন</a> | 
                <a href="index.html">হোম পেজে ফিরুন</a>
            </div>
        </div>
    </div>

    <script>
        const auth = firebase.auth();
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            msgDiv.className = 'message ' + type + '-msg';
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }
        
        async function sendResetEmail() {
            const email = document.getElementById('resetEmail').value.trim();
            
            if(!email) {
                showMessage('❌ ইমেইল দিন!', 'error');
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                showMessage('✅ পাসওয়ার্ড রিসেট লিংক পাঠানো হয়েছে!\n\nআপনার ইমেইল চেক করুন (স্প্যাম ফোল্ডারও চেক করুন)।', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch(error) {
                console.error(error);
                if(error.code === 'auth/user-not-found') {
                    showMessage('❌ এই ইমেইলে কোনো অ্যাকাউন্ট নেই!', 'error');
                } else if(error.code === 'auth/invalid-email') {
                    showMessage('❌ সঠিক ইমেইল দিন!', 'error');
                } else {
                    showMessage('❌ ' + error.message, 'error');
                }
            }
        }
        
        window.sendResetEmail = sendResetEmail;
    </script>
</body>
</html>
