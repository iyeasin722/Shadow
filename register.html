<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ছায়াবর্তী - সাইনআপ</title>
    <!-- Firebase SDKs - শুধু প্রয়োজনীয়গুলো -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fb-blue: #1877f2;
            --fb-bg: #f0f2f5;
            --telegram-blue: #229ed9;
            --discord-blurple: #5865f2;
            --twitter-blue: #1da1f2;
            --dark-bg: #18191a;
            --card-white: #ffffff;
            --text-dark: #1c1e21;
            --text-light: #e4e6eb;
            --border-light: #e4e6eb;
            --danger: #e41e3f;
            --success: #23a55a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Siyam Rupali', sans-serif;
            background: var(--fb-bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--text-light);
        }

        .register-container {
            max-width: 500px;
            width: 90%;
            margin: 40px auto;
        }

        .register-card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.1);
        }

        body.dark-mode .register-card {
            background: #1e1f22;
        }

        .logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--fb-blue), var(--twitter-blue), var(--telegram-blue), var(--discord-blurple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #65676b;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--fb-bg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--fb-blue);
        }

        body.dark-mode .form-group input {
            background: #2b2d31;
            border-color: #3e4042;
            color: var(--text-light);
        }

        .register-btn {
            width: 100%;
            background: var(--fb-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .register-btn:hover {
            opacity: 0.9;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .login-link a {
            color: var(--fb-blue);
            text-decoration: none;
            cursor: pointer;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeInOut 3s ease;
        }

        .toast.error {
            background: var(--danger);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">📖</div>
            <h1>ছায়াবর্তী</h1>
            <div class="subtitle">নতুন অ্যাকাউন্ট তৈরি করুন</div>

            <form id="registerForm">
                <div class="form-group">
                    <label>আপনার নাম</label>
                    <input type="text" id="fullName" placeholder=MDYEASIN ALI" required>
                </div>

                <div class="form-group">
                    <label>ইমেইল ঠিকানা</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="password" placeholder="কমপক্ষে ৬ অক্ষর" required>
                </div>

                <div class="form-group">
                    <label>পাসওয়ার্ড নিশ্চিত করুন</label>
                    <input type="password" id="confirmPassword" placeholder="আবার পাসওয়ার্ড দিন" required>
                </div>

                <button type="submit" class="register-btn">📝 সাইনআপ করুন</button>
            </form>

            <div class="login-link">
                ইতিমধ্যে অ্যাকাউন্ট আছে? <a onclick="goToLogin()">লগইন করুন</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7",
            measurementId: "G-BQBWVRRQPH"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // থিম ফাংশন
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if(saved === 'dark') {
                document.body.classList.add('dark-mode');
            }
        }

        // রেজিস্ট্রেশন ফাংশন (Firebase Auth ব্যবহার করে)
        async function registerUser(name, email, password) {
            try {
                // Firebase Auth দিয়ে ইউজার তৈরি করুন
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // ইউজারের প্রোফাইল আপডেট করুন (নাম)
                await user.updateProfile({
                    displayName: name
                });
                
                // Realtime Database-এ ইউজারের তথ্য সংরক্ষণ করুন
                await database.ref(`users/${user.uid}`).set({
                    name: name,
                    email: email,
                    uid: user.uid,
                    joinedAt: Date.now(),
                    role: 'user',
                    isPremium: false,
                    avatar: null,
                    bio: ''
                });
                
                return { success: true, user: user };
            } catch (error) {
                console.error("Registration error:", error);
                let errorMessage = "রেজিস্ট্রেশন ব্যর্থ!";
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = "❌ এই ইমেইলে ইতিমধ্যে অ্যাকাউন্ট আছে!";
                        break;
                    case 'auth/invalid-email':
                        errorMessage = "❌ সঠিক ইমেইল দিন!";
                        break;
                    case 'auth/weak-password':
                        errorMessage = "❌ পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে!";
                        break;
                    default:
                        errorMessage = `❌ ${error.message}`;
                }
                
                return { success: false, error: errorMessage };
            }
        }

        // ফর্ম সাবমিট হ্যান্ডলার
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // ভ্যালিডেশন
            if(!fullName) {
                showToast("❌ আপনার নাম দিন!", true);
                return;
            }
            
            if(!email) {
                showToast("❌ ইমেইল দিন!", true);
                return;
            }
            
            if(!email.includes('@') || !email.includes('.')) {
                showToast("❌ সঠিক ইমেইল দিন!", true);
                return;
            }
            
            if(password.length < 6) {
                showToast("❌ পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে!", true);
                return;
            }
            
            if(password !== confirmPassword) {
                showToast("❌ পাসওয়ার্ড মিলছে না!", true);
                return;
            }
            
            // রেজিস্ট্রেশন করা
            const result = await registerUser(fullName, email, password);
            
            if(result.success) {
                showToast("✅ সাইনআপ সফল! স্বাগতম!");
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showToast(result.error, true);
            }
        });
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        
        // থিম ইনিশিয়ালাইজ
        initTheme();
        
        console.log("📝 রেজিস্ট্রেশন পেজ রেডি!");
    </script>
</body>
</html>
