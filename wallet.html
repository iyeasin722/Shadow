<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ওয়ালেট - ছায়াবর্তী</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        body.dark-mode { background: #0e1621; color: #e4e6eb; }
        .navbar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark-mode .navbar { background: #17212b; }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #1877f2, #1da1f2, #229ed9, #5865f2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
        }
        body.dark-mode .card { background: #17212b; }
        .payment-info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        body.dark-mode .payment-info { background: #242f3d; }
        .payment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .bkash-row { background: rgba(226,19,110,0.1); border-left: 3px solid #e2136e; }
        .nagad-row { background: rgba(240,106,44,0.1); border-left: 3px solid #f06a2c; }
        .payment-number { font-size: 1.1rem; font-weight: bold; font-family: monospace; }
        .copy-btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .balance {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1877f2, #5865f2);
            border-radius: 20px;
            color: white;
            margin-bottom: 25px;
        }
        .balance .amount { font-size: 2.5rem; font-weight: bold; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e4e6eb;
            background: #f0f2f5;
            outline: none;
        }
        body.dark-mode .form-group input, body.dark-mode .form-group select {
            background: #242f3d;
            border-color: #3e4042;
            color: white;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #1877f2; color: white; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #23a55a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeOut 3s ease;
        }
        .toast.error { background: #e41e3f; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        .back-btn { color: #1877f2; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">💰 ওয়ালেট</div>
        <a class="back-btn" onclick="location.href='index.html'">← ফিরুন</a>
    </nav>

    <div class="container">
        <div class="card">
            <div class="payment-info">
                <div style="font-weight:bold; text-align:center; margin-bottom:15px;">📞 টাকা পাঠানোর মাধ্যম</div>
                <div class="payment-row bkash-row">
                    <span>📱 bKash (sendmoney)</span>
                    <span class="payment-number" id="bkashNumber">01946558119</span>
                    <button class="copy-btn" onclick="copyNumber('bkash')">কপি</button>
                </div>
                <div class="payment-row nagad-row">
                    <span>📱 নগদ (sendmoney)</span>
                    <span class="payment-number" id="nagadNumber">01824845118</span>
                    <button class="copy-btn" onclick="copyNumber('nagad')">কপি</button>
                </div>
                <div style="font-size:0.7rem; text-align:center; margin-top:10px;">💡 পেমেন্ট完成后 TXID দিন। অ্যাডমিন ভেরিফাই করলে টাকা যোগ হবে।</div>
            </div>

            <div class="balance">
                <div>💰 আপনার ব্যালেন্স</div>
                <div class="amount" id="userBalance">0</div>
                <div>টাকা</div>
            </div>

            <h3 style="margin-bottom: 20px;">📥 টাকা যোগ করুন</h3>
            <form id="addMoneyForm">
                <div class="form-group">
                    <label>টাকার পরিমাণ (ন্যূনতম ১০ টাকা)</label>
                    <input type="number" id="amount" placeholder="যেমন: 100" required min="10">
                </div>
                <div class="form-group">
                    <label>পেমেন্ট পদ্ধতি</label>
                    <select id="paymentMethod">
                        <option value="bKash">bKash (01946558119)</option>
                        <option value="Nagad">নগদ (01824845118)</option>
                        <option value="Rocket">Rocket</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>মোবাইল নাম্বার (যে নাম্বার দিয়ে পেমেন্ট করেছেন)</label>
                    <input type="tel" id="mobileNumber" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>TXID (ট্রানজেকশন আইডি)</label>
                    <input type="text" id="txid" placeholder="bKash/Nagad TXID" required>
                </div>
                <button type="submit" class="btn btn-primary">📤 রিকোয়েস্ট পাঠান</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let currentUser = null;

        function showToast(msg, isErr=false) { let t=document.createElement('div'); t.className='toast'+(isErr?' error':''); t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function copyNumber(type){ let n=type==='bkash'?'01946558119':'01824845118'; navigator.clipboard.writeText(n); showToast(`✅ ${type==='bkash'?'bKash':'নগদ'} নম্বর কপি!`); }
        async function loadBalance(){ if(!currentUser) return; let s=await db.ref(`users/${currentUser.uid}/wallet/balance`).once('value'); document.getElementById('userBalance').innerText=s.val()||0; }
        async function isTxidDuplicate(txid){ let s=await db.ref('transactions').orderByChild('txid').equalTo(txid).once('value'); return s.exists(); }
        
        document.getElementById('addMoneyForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUser){ showToast("লগইন করুন!",true); return; }
            let amount=parseInt(document.getElementById('amount').value);
            let mobile=document.getElementById('mobileNumber').value.trim();
            let txid=document.getElementById('txid').value.trim().toUpperCase();
            let method=document.getElementById('paymentMethod').value;
            if(amount<10){ showToast("কমপক্ষে 10 টাকা!",true); return; }
            if(!mobile||mobile.length<11){ showToast("সঠিক মোবাইল!",true); return; }
            if(!txid){ showToast("TXID দিন!",true); return; }
            if(await isTxidDuplicate(txid)){ showToast("এই TXID ইতিমধ্যে ব্যবহার!",true); return; }
            let tx={ userId:currentUser.uid, userName:currentUser.displayName||currentUser.email.split('@')[0], userEmail:currentUser.email, amount, mobileNumber:mobile, txid, paymentMethod:method, type:'add', status:'pending', timestamp:Date.now() };
            let pendingRef=db.ref('pending_transactions').push();
            await pendingRef.set(tx);
            await db.ref(`transactions/${currentUser.uid}/${pendingRef.key}`).set(tx);
            showToast("✅ রিকোয়েস্ট পাঠানো হয়েছে! অ্যাডমিন ভেরিফাই করবে।");
            document.getElementById('addMoneyForm').reset();
        });

        auth.onAuthStateChanged((user)=>{ if(user){ currentUser=user; loadBalance(); } else { location.href='login.html'; } });
        window.copyNumber=copyNumber;
    </script>
</body>
</html>
