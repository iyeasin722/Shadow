<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ছায়াবর্তী - আমার গল্প</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --fb-blue: #1877f2;
            --fb-bg: #f0f2f5;
            --dark-bg: #18191a;
            --card-white: #ffffff;
            --text-dark: #1c1e21;
            --text-light: #e4e6eb;
            --border-light: #e4e6eb;
            --danger: #e41e3f;
            --success: #23a55a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--fb-bg);
            color: var(--text-dark);
        }
        
        body.dark-mode {
            background: var(--dark-bg);
            color: var(--text-light);
        }
        
        .navbar {
            background: var(--card-white);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            height: 56px;
            display: flex;
            align-items: center;
        }
        body.dark-mode .navbar { background: #1e1f22; }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #1877f2, #1da1f2, #229ed9, #5865f2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        
        .nav-icons { display: flex; gap: 8px; }
        .nav-icon {
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: #65676b;
            font-size: 1.2rem;
        }
        .nav-icon:hover { background: var(--fb-bg); }
        
        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            width: 160px;
            display: none;
            z-index: 100;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
        }
        .dropdown-item:hover { background: var(--fb-bg); }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 2rem; }
        .page-header p { color: #65676b; margin-top: 8px; }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--card-white);
            padding: 10px 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        body.dark-mode .stat-chip { background: #1e1f22; }
        .stat-number { font-weight: bold; font-size: 1.3rem; color: var(--fb-blue); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 10px;
        }
        .tab-btn {
            padding: 8px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 20px;
        }
        .tab-btn.active {
            color: var(--fb-blue);
            background: var(--fb-bg);
        }
        
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .story-card {
            background: var(--card-white);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
            position: relative;
        }
        body.dark-mode .story-card { background: #1e1f22; }
        .story-card:hover { transform: translateY(-4px); }
        
        .story-image {
            height: 160px;
            background: linear-gradient(135deg, #1877f2, #5865f2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        
        .story-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f39c12;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .story-badge.free { background: #23a55a; }
        .story-badge.premium { background: linear-gradient(135deg, #f1c40f, #e67e22); }
        
        .story-info { padding: 16px; }
        .story-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--fb-blue);
        }
        .story-meta {
            display: flex;
            gap: 15px;
            font-size: 0.7rem;
            color: #65676b;
            margin-bottom: 12px;
        }
        .story-preview {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 16px;
            color: #65676b;
        }
        .story-stats {
            display: flex;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
            font-size: 0.75rem;
        }
        
        .story-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            color: #65676b;
        }
        .action-btn:hover { background: var(--fb-bg); }
        .delete-btn:hover { color: var(--danger); background: rgba(228,30,63,0.1); }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--card-white);
            border-radius: 16px;
            grid-column: 1 / -1;
        }
        body.dark-mode .empty-state { background: #1e1f22; }
        .empty-state-icon { font-size: 4rem; margin-bottom: 16px; }
        .write-btn {
            background: var(--fb-blue);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            grid-column: 1 / -1;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #23a55a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeOut 3s ease;
        }
        .toast.error { background: #e41e3f; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @media (max-width: 768px) {
            .stories-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">📖 ছায়াবর্তী</div>
            <div class="nav-icons">
                <div class="nav-icon" onclick="location.href='index.html'">🏠</div>
                <div class="nav-icon" onclick="location.href='post-story.html'">✍️</div>
                <div class="nav-icon" id="themeToggle">🌙</div>
            </div>
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar" onclick="toggleMenu()">?</div>
                <div id="dropdownMenu" class="dropdown-menu">
                    <div class="dropdown-item" onclick="location.href='profile.html'">👤 প্রোফাইল</div>
                    <div class="dropdown-item" onclick="location.href='settings.html'">⚙️ সেটিংস</div>
                    <div class="dropdown-item" id="logoutBtn">🚪 লগআউট</div>
                    <div class="dropdown-item" id="loginBtn">🔐 লগইন</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📚 আমার গল্প</h1>
            <p>আপনার লেখা সকল গল্প এখানে দেখতে পাবেন</p>
        </div>

        <div class="stats-bar">
            <div class="stat-chip">📖 মোট গল্প: <span id="totalCount" class="stat-number">0</span></div>
            <div class="stat-chip">❤️ মোট লাইক: <span id="totalLikes" class="stat-number">0</span></div>
            <div class="stat-chip">💬 মোট মন্তব্য: <span id="totalComments" class="stat-number">0</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="all">📚 সব গল্প</button>
            <button class="tab-btn" data-tab="published">✅ প্রকাশিত</button>
            <button class="tab-btn" data-tab="draft">📝 খসড়া</button>
        </div>

        <div id="storiesContainer" class="stories-grid">
            <div class="loading">⏳ লোড হচ্ছে...</div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentTab = 'all';
        let userStories = [];

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getInitial(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'নতুন';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'এখনই';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' মিনিট আগে';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ঘন্টা আগে';
            return date.toLocaleDateString('bn-BD');
        }

        function loadUserStories() {
            if (!currentUser) return;

            const container = document.getElementById('storiesContainer');
            container.innerHTML = '<div class="loading">⏳ লোড হচ্ছে...</div>';

            // সব গল্প লোড করুন
            db.ref('stories').once('value', (snapshot) => {
                userStories = [];
                let totalLikes = 0;
                let totalComments = 0;

                snapshot.forEach((child) => {
                    const story = { id: child.key, ...child.val() };
                    
                    // চেক করুন এই গল্পটি বর্তমান ইউজারের কিনা
                    const isMine = (story.authorId === currentUser.uid) || 
                                   (story.authorEmail === currentUser.email) ||
                                   (story.author === currentUser.displayName);
                    
                    if (isMine) {
                        userStories.push(story);
                        totalLikes += story.likes || 0;
                        totalComments += story.comments ? Object.keys(story.comments).length : 0;
                    }
                });

                // তারিখ অনুযায়ী সাজান
                userStories.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                // আপডেট পরিসংখ্যান
                document.getElementById('totalCount').innerText = userStories.length;
                document.getElementById('totalLikes').innerText = totalLikes;
                document.getElementById('totalComments').innerText = totalComments;

                if (userStories.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📖</div>
                            <h3>কোনো গল্প নেই</h3>
                            <p>আপনি এখনো কোনো গল্প লেখেননি</p>
                            <button class="write-btn" onclick="location.href='post-story.html'">✍️ প্রথম গল্প লিখুন</button>
                        </div>
                    `;
                    return;
                }

                displayStories();
            }).catch(err => {
                console.error(err);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>লোড করতে সমস্যা হয়েছে</h3>
                        <p>${err.message}</p>
                        <button class="write-btn" onclick="location.reload()">🔄 রিফ্রেশ</button>
                    </div>
                `;
            });
        }

        function displayStories() {
            const container = document.getElementById('storiesContainer');
            
            let filtered = [...userStories];
            if (currentTab === 'published') {
                filtered = filtered.filter(s => s.status !== 'draft');
            } else if (currentTab === 'draft') {
                filtered = filtered.filter(s => s.status === 'draft');
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>${currentTab === 'draft' ? 'কোনো খসড়া গল্প নেই' : 'কোনো গল্প নেই'}</h3>
                        <button class="write-btn" onclick="location.href='post-story.html'">✍️ নতুন গল্প লিখুন</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(story => `
                <div class="story-card">
                    <div class="story-image">📖</div>
                    <span class="story-badge ${(story.price || 0) > 0 ? 'premium' : 'free'}">
                        ${(story.price || 0) > 0 ? `💰 ${story.price} টাকা` : 'ফ্রি'}
                    </span>
                    <div class="story-info">
                        <div class="story-title">${escapeHtml(story.title)}</div>
                        <div class="story-meta">
                            <span>📅 ${formatDate(story.timestamp)}</span>
                            <span>📄 ${story.pages || 1} পৃষ্ঠা</span>
                            <span>❤️ ${story.likes || 0}</span>
                            <span>💬 ${story.comments ? Object.keys(story.comments).length : 0}</span>
                        </div>
                        <div class="story-preview">${escapeHtml((story.content || '').substring(0, 120))}${(story.content || '').length > 120 ? '...' : ''}</div>
                        <div class="story-stats">
                            <span>👁️ ${story.views || 0} বার দেখা</span>
                            ${story.status === 'draft' ? '<span style="color:#f39c12;">📝 খসড়া</span>' : ''}
                        </div>
                        <div class="story-actions">
                            <button class="action-btn" onclick="viewStory('${story.id}')">📖 পড়ুন</button>
                            <button class="action-btn delete-btn" onclick="deleteStory('${story.id}', '${escapeHtml(story.title)}')">🗑️ ডিলেট</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewStory(storyId) {
            window.open(`story-view.html?id=${storyId}`, '_blank');
        }

        function deleteStory(storyId, title) {
            if (!confirm(`"${title}" গল্পটি ডিলেট করতে চান?`)) return;
            db.ref(`stories/${storyId}`).remove().then(() => {
                showToast("✅ গল্প ডিলেট করা হয়েছে!");
                loadUserStories();
            }).catch(err => showToast(err.message, true));
        }

        // ট্যাব পরিবর্তন
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.getAttribute('data-tab');
                displayStories();
            });
        });

        // থিম
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').innerHTML = '☀️';
            } else {
                document.getElementById('themeToggle').innerHTML = '🌙';
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').innerHTML = isDark ? '☀️' : '🌙';
        }

        function toggleMenu() {
            document.getElementById('dropdownMenu').classList.toggle('show');
        }

        function logout() {
            auth.signOut().then(() => {
                showToast("🚪 লগআউট হয়েছে!");
                setTimeout(() => location.href = 'index.html', 800);
            });
        }

        function goToLogin() {
            location.href = 'login.html';
        }

        // Auth State
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('profileAvatar').textContent = getInitial(user.displayName || user.email);
                document.getElementById('loginBtn').style.display = 'none';
                loadUserStories();
            } else {
                currentUser = null;
                document.getElementById('profileAvatar').textContent = '?';
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('storiesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔐</div>
                        <h3>দেখতে লগইন করুন</h3>
                        <p>আপনার গল্প দেখতে প্রথমে লগইন করুন</p>
                        <button class="write-btn" onclick="location.href='login.html'">🔐 লগইন করুন</button>
                    </div>
                `;
                document.getElementById('totalCount').innerText = '0';
                document.getElementById('totalLikes').innerText = '0';
                document.getElementById('totalComments').innerText = '0';
            }
        });

        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('loginBtn')?.addEventListener('click', goToLogin);
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.profile-section')) {
                document.getElementById('dropdownMenu').classList.remove('show');
            }
        });

        window.viewStory = viewStory;
        window.deleteStory = deleteStory;
        window.toggleMenu = toggleMenu;

        initTheme();
        console.log("📚 আমার গল্প পেজ প্রস্তুত!");
    </script>
</body>
</html>
