<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ছায়াবর্তী - নতুন গল্প লিখুন</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fb-blue: #1877f2;
            --fb-bg: #f0f2f5;
            --telegram-blue: #229ed9;
            --discord-blurple: #5865f2;
            --twitter-blue: #1da1f2;
            --dark-bg: #18191a;
            --card-white: #ffffff;
            --text-dark: #1c1e21;
            --text-light: #e4e6eb;
            --border-light: #e4e6eb;
            --danger: #e41e3f;
            --success: #23a55a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Siyam Rupali', sans-serif;
            background: var(--fb-bg);
            color: var(--text-dark);
            min-height: 100vh;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--text-light);
        }

        /* নেভিগেশন বার */
        .navbar {
            background: var(--card-white);
            padding: 8px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            height: 56px;
            display: flex;
            align-items: center;
        }
        body.dark-mode .navbar {
            background: #1e1f22;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--fb-blue), var(--twitter-blue), var(--telegram-blue), var(--discord-blurple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .nav-icons {
            display: flex;
            gap: 8px;
        }
        .nav-icon {
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: #65676b;
            font-size: 1.2rem;
        }
        .nav-icon:hover {
            background: var(--fb-bg);
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--discord-blurple);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--card-white);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            width: 160px;
            display: none;
            z-index: 100;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
        }
        .dropdown-item:hover {
            background: var(--fb-bg);
        }

        /* ফর্ম কন্টেইনার */
        .form-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .form-card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        body.dark-mode .form-card {
            background: #1e1f22;
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .form-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .form-header p {
            color: #65676b;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input, 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--fb-bg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--fb-blue);
        }
        body.dark-mode .form-group input,
        body.dark-mode .form-group textarea,
        body.dark-mode .form-group select {
            background: #2b2d31;
            border-color: #3e4042;
            color: var(--text-light);
        }
        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .publish-btn {
            width: 100%;
            background: var(--fb-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .publish-btn:hover {
            opacity: 0.9;
        }
        .draft-btn {
            width: 100%;
            background: #65676b;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeInOut 3s ease;
        }
        .toast.error {
            background: var(--danger);
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.href='index.html'">📖 ছায়াবর্তী</div>
            <div class="nav-icons">
                <div class="nav-icon" onclick="location.href='index.html'">🏠</div>
                <div class="nav-icon" onclick="location.href='my-stories.html'">📚</div>
                <div class="nav-icon" id="themeToggle">🌙</div>
            </div>
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar" onclick="toggleMenu()">?</div>
                <div id="dropdownMenu" class="dropdown-menu">
                    <div class="dropdown-item" onclick="location.href='profile.html'">👤 প্রোফাইল</div>
                    <div class="dropdown-item" onclick="location.href='my-stories.html'">📚 আমার গল্প</div>
                    <div class="dropdown-item" id="logoutBtn">🚪 লগআউট</div>
                    <div class="dropdown-item" id="loginBtn">🔐 লগইন</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <h1>✍️ নতুন গল্প লিখুন</h1>
                <p>আপনার সৃজনশীলতা প্রকাশ করুন</p>
            </div>

            <form id="storyForm">
                <div class="form-group">
                    <label>গল্পের শিরোনাম *</label>
                    <input type="text" id="title" placeholder="আকর্ষণীয় শিরোনাম দিন" required>
                </div>

                <div class="form-group">
                    <label>গল্পের বিবরণ / কন্টেন্ট *</label>
                    <textarea id="content" placeholder="আপনার গল্প এখানে লিখুন..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>পৃষ্ঠা সংখ্যা</label>
                        <input type="number" id="pages" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>মূল্য (টাকা)</label>
                        <input type="number" id="price" value="0" min="0">
                        <small style="color:#65676b;">0 হলে ফ্রি হবে</small>
                    </div>
                </div>

                <div class="form-group">
                    <label>ক্যাটাগরি</label>
                    <select id="category">
                        <option value="গল্প">📖 গল্প</option>
                        <option value="উপন্যাস">📚 উপন্যাস</option>
                        <option value="কবিতা">📝 কবিতা</option>
                        <option value="প্রবন্ধ">✍️ প্রবন্ধ</option>
                        <option value="অন্যান্য">🎭 অন্যান্য</option>
                    </select>
                </div>

                <button type="submit" class="publish-btn">🚀 প্রকাশ করুন</button>
                <button type="button" class="draft-btn" id="saveDraftBtn">📝 খসড়া হিসেবে সংরক্ষণ</button>
            </form>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDk2_bo8CPJKhtdTEcG2SnpViSNsxCcdDQ",
            authDomain: "iyeasin.firebaseapp.com",
            databaseURL: "https://iyeasin-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iyeasin",
            storageBucket: "iyeasin.firebasestorage.app",
            messagingSenderId: "496731961702",
            appId: "1:496731961702:web:68d6aeb6088fc0809af0a7",
            measurementId: "G-BQBWVRRQPH"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function getInitial(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }

        function toggleMenu() {
            document.getElementById('dropdownMenu').classList.toggle('show');
        }

        function saveStory(status) {
            if (!currentUser) {
                showToast("গল্প লিখতে লগইন করুন!", true);
                setTimeout(() => location.href = 'login.html', 1000);
                return;
            }

            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const pages = parseInt(document.getElementById('pages').value) || 1;
            const price = parseInt(document.getElementById('price').value) || 0;
            const category = document.getElementById('category').value;

            if (!title) {
                showToast("শিরোনাম দিন!", true);
                return;
            }
            if (!content) {
                showToast("গল্পের বিবরণ দিন!", true);
                return;
            }

            const storyData = {
                title: title,
                content: content,
                pages: pages,
                price: price,
                category: category,
                status: status,
                authorName: currentUser.displayName || currentUser.email.split('@')[0],
                authorEmail: currentUser.email,
                authorId: currentUser.uid,
                timestamp: Date.now(),
                likes: 0,
                views: 0,
                comments: {}
            };

            database.ref('stories').push(storyData).then(() => {
                const msg = status === 'published' ? "✅ গল্প প্রকাশিত হয়েছে!" : "📝 খসড়া সংরক্ষণ করা হয়েছে!";
                showToast(msg);
                
                // ফর্ম রিসেট
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                document.getElementById('pages').value = '1';
                document.getElementById('price').value = '0';
                
                if (status === 'published') {
                    setTimeout(() => location.href = 'my-stories.html', 1500);
                }
            }).catch(err => {
                console.error(err);
                showToast("গল্প সংরক্ষণে সমস্যা হয়েছে: " + err.message, true);
            });
        }

        // ফর্ম সাবমিট
        document.getElementById('storyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            saveStory('published');
        });

        document.getElementById('saveDraftBtn').addEventListener('click', () => {
            saveStory('draft');
        });

        // থিম
        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').innerHTML = '☀️';
            } else {
                document.getElementById('themeToggle').innerHTML = '🌙';
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').innerHTML = isDark ? '☀️' : '🌙';
        }

        function logout() {
            auth.signOut().then(() => {
                showToast("🚪 লগআউট হয়েছে!");
                setTimeout(() => location.href = 'index.html', 800);
            });
        }

        function goToLogin() {
            location.href = 'login.html';
        }

        // Auth State
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('profileAvatar').textContent = getInitial(user.displayName || user.email);
                document.getElementById('loginBtn').style.display = 'none';
            } else {
                currentUser = null;
                document.getElementById('profileAvatar').textContent = '?';
                document.getElementById('loginBtn').style.display = 'block';
            }
        });

        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('loginBtn')?.addEventListener('click', goToLogin);
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.profile-section')) {
                document.getElementById('dropdownMenu').classList.remove('show');
            }
        });

        window.toggleMenu = toggleMenu;

        initTheme();
        console.log("✍️ গল্প লেখার পেজ প্রস্তুত!");
    </script>
</body>
</html>
