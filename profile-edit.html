<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল এডিট - ছায়াবর্তী</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Siyam Rupali', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
            min-height: 100vh;
        }
        .navbar {
            background: #020617;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { color: #ffd700; font-size: 1.2rem; font-weight: bold; }
        .back-btn { color: #ffd700; text-decoration: none; }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .card h3 {
            color: #ffd700;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 0.75rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #334155;
            color: #fff;
            font-size: 0.9rem;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        /* ছবি আপলোড স্টাইল */
        .photo-section {
            text-align: center;
        }
        .cover-area {
            margin-bottom: 15px;
        }
        .cover-preview {
            width: 100%;
            height: 130px;
            background: linear-gradient(135deg, #334155, #1e293b);
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            margin-bottom: 8px;
            border: 1px solid #334155;
        }
        .avatar-area {
            margin-top: -45px;
            margin-bottom: 15px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #334155;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            overflow: hidden;
            border: 3px solid #ffd700;
            background-size: cover;
            background-position: center;
        }
        .photo-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 8px;
        }
        .photo-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .remove-btn {
            background: #ef4444;
        }
        .btn-save {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .success { background: #22c55e; }
        .error { background: #ef4444; }
        @media (max-width: 550px) {
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">✏️ প্রোফাইল এডিট</div>
        <a href="profile.html" class="back-btn">← ফিরুন</a>
    </nav>

    <div class="container">
        <div id="msg" class="message"></div>
        
        <!-- ছবি আপলোড সেকশন -->
        <div class="card">
            <h3>🖼️ প্রোফাইল ছবি ও কভার</h3>
            <div class="photo-section">
                <div class="cover-area">
                    <div class="cover-preview" id="coverPreview"></div>
                    <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="previewCover(this)">
                    <div class="photo-buttons">
                        <button class="photo-btn" onclick="document.getElementById('coverInput').click()">📸 কভার আপলোড</button>
                        <button class="photo-btn remove-btn" onclick="removeCover()">🗑️ সরান</button>
                    </div>
                </div>
                
                <div class="avatar-area">
                    <div class="avatar-preview" id="avatarPreview">
                        <span id="avatarText">?</span>
                        <img id="avatarImg" style="display:none;">
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="previewAvatar(this)">
                    <div class="photo-buttons">
                        <button class="photo-btn" onclick="document.getElementById('avatarInput').click()">📸 প্রোফাইল ছবি</button>
                        <button class="photo-btn remove-btn" onclick="removeAvatar()">🗑️ সরান</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- মৌলিক তথ্য -->
        <div class="card">
            <h3>👤 মৌলিক তথ্য</h3>
            <div class="form-group"><label>👤 পুরো নাম *</label><input type="text" id="name" placeholder="আপনার নাম"></div>
            <div class="form-group"><label>📧 ইমেইল</label><input type="email" id="email" readonly disabled style="opacity:0.7;"></div>
            <div class="row-2">
                <div class="form-group"><label>📱 ফোন</label><input type="tel" id="phone" placeholder="01XXXXXXXXX"></div>
                <div class="form-group"><label>🎂 জন্ম তারিখ</label><input type="date" id="birthday"></div>
            </div>
            <div class="row-2">
                <div class="form-group"><label>🩸 রক্তের গ্রুপ</label>
                    <select id="bloodGroup">
                        <option value="">সিলেক্ট</option>
                        <option value="A+">A+</option><option value="A-">A-</option>
                        <option value="B+">B+</option><option value="B-">B-</option>
                        <option value="O+">O+</option><option value="O-">O-</option>
                        <option value="AB+">AB+</option><option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group"><label>💍 বৈবাহিক অবস্থা</label>
                    <select id="marital">
                        <option value="">সিলেক্ট</option>
                        <option value="single">অবিবাহিত</option>
                        <option value="married">বিবাহিত</option>
                        <option value="divorced">বিবাহবিচ্ছিন্ন</option>
                        <option value="widowed">বিধবা/বিধুর</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- পেশাগত তথ্য -->
        <div class="card">
            <h3>💼 পেশাগত তথ্য</h3>
            <div class="row-2">
                <div class="form-group"><label>পেশার অবস্থা</label>
                    <select id="employment">
                        <option value="">সিলেক্ট</option>
                        <option value="employed">চাকরিজীবী</option>
                        <option value="business">ব্যবসায়ী</option>
                        <option value="student">ছাত্র/ছাত্রী</option>
                        <option value="unemployed">বেকার</option>
                        <option value="housewife">গৃহিণী</option>
                    </select>
                </div>
                <div class="form-group"><label>🏢 প্রতিষ্ঠান</label><input type="text" id="company" placeholder="প্রতিষ্ঠানের নাম"></div>
            </div>
            <div class="form-group"><label>📝 পদ</label><input type="text" id="position" placeholder="পদের নাম"></div>
        </div>
        
        <!-- শিক্ষাগত তথ্য -->
        <div class="card">
            <h3>🎓 শিক্ষাগত তথ্য</h3>
            <div class="row-2">
                <div class="form-group"><label>যোগ্যতা</label>
                    <select id="education">
                        <option value="">সিলেক্ট</option>
                        <option value="ssc">SSC</option><option value="hsc">HSC</option>
                        <option value="honors">অনার্স</option><option value="masters">মাস্টার্স</option>
                    </select>
                </div>
                <div class="form-group"><label>🏫 প্রতিষ্ঠান</label><input type="text" id="institution" placeholder="বিদ্যালয়/কলেজ"></div>
            </div>
            <div class="form-group"><label>📅 পাশের বছর</label><input type="number" id="passYear" placeholder="2024"></div>
        </div>
        
        <!-- ঠিকানা -->
        <div class="card">
            <h3>📍 ঠিকানা</h3>
            <div class="form-group"><label>বর্তমান ঠিকানা</label><textarea id="currentAddress" rows="2" placeholder="বর্তমান ঠিকানা"></textarea></div>
            <div class="row-2">
                <div class="form-group"><label>জেলা</label><input type="text" id="district" placeholder="জেলা"></div>
                <div class="form-group"><label>বিভাগ</label><input type="text" id="division" placeholder="বিভাগ"></div>
            </div>
            <div class="form-group"><label>দেশ</label><input type="text" id="country" placeholder="বাংলাদেশ"></div>
        </div>
        
        <!-- জীবনী -->
        <div class="card">
            <h3>📝 জীবনী</h3>
            <div class="form-group"><label>নিজের সম্পর্কে</label><textarea id="bio" rows="2" placeholder="আপনার সম্পর্কে লিখুন..."></textarea></div>
            <div class="form-group"><label>🔗 ওয়েবসাইট</label><input type="text" id="website" placeholder="https://..."></div>
        </div>
        
        <button class="btn-save" onclick="saveProfile()">💾 প্রোফাইল সংরক্ষণ করুন</button>
    </div>

    <script>
        let currentUser = null;
        let avatarDataUrl = null;
        let coverDataUrl = null;
        
        function showMessage(msg, type) {
            const div = document.getElementById('msg');
            div.innerHTML = msg;
            div.className = 'message ' + type;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        function previewAvatar(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                if(file.size > 2 * 1024 * 1024) {
                    showMessage('❌ ছবি 2MB এর ছোট হতে হবে!', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarDataUrl = e.target.result;
                    document.getElementById('avatarText').style.display = 'none';
                    document.getElementById('avatarImg').src = avatarDataUrl;
                    document.getElementById('avatarImg').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }
        
        function previewCover(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                if(file.size > 5 * 1024 * 1024) {
                    showMessage('❌ কভার ছবি 5MB এর ছোট হতে হবে!', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    coverDataUrl = e.target.result;
                    document.getElementById('coverPreview').style.backgroundImage = `url(${coverDataUrl})`;
                };
                reader.readAsDataURL(file);
            }
        }
        
        function removeAvatar() {
            avatarDataUrl = null;
            document.getElementById('avatarInput').value = '';
            document.getElementById('avatarText').style.display = 'flex';
            document.getElementById('avatarImg').style.display = 'none';
        }
        
        function removeCover() {
            coverDataUrl = null;
            document.getElementById('coverInput').value = '';
            document.getElementById('coverPreview').style.backgroundImage = '';
        }
        
        function loadUser() {
            const saved = localStorage.getItem('shadowverse_user');
            if(!saved) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(saved);
            
            let users = JSON.parse(localStorage.getItem('shadowverse_users') || '[]');
            let user = users.find(u => u.email === currentUser.email) || {};
            
            document.getElementById('name').value = user.name || currentUser.name || '';
            document.getElementById('email').value = currentUser.email;
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('birthday').value = user.birthday || '';
            document.getElementById('bloodGroup').value = user.bloodGroup || '';
            document.getElementById('marital').value = user.maritalStatus || '';
            document.getElementById('employment').value = user.employment || '';
            document.getElementById('company').value = user.company || '';
            document.getElementById('position').value = user.position || '';
            document.getElementById('education').value = user.education || '';
            document.getElementById('institution').value = user.institution || '';
            document.getElementById('passYear').value = user.passYear || '';
            document.getElementById('currentAddress').value = user.currentAddress || '';
            document.getElementById('district').value = user.district || '';
            document.getElementById('division').value = user.division || '';
            document.getElementById('country').value = user.country || 'বাংলাদেশ';
            document.getElementById('bio').value = user.bio || '';
            document.getElementById('website').value = user.website || '';
            
            // ছবি লোড
            if(user.avatarDataUrl) {
                avatarDataUrl = user.avatarDataUrl;
                document.getElementById('avatarText').style.display = 'none';
                document.getElementById('avatarImg').src = avatarDataUrl;
                document.getElementById('avatarImg').style.display = 'block';
            }
            if(user.coverDataUrl) {
                coverDataUrl = user.coverDataUrl;
                document.getElementById('coverPreview').style.backgroundImage = `url(${coverDataUrl})`;
            }
        }
        
        function saveProfile() {
            const name = document.getElementById('name').value.trim();
            if(!name) { showMessage('❌ নাম দিন!', 'error'); return; }
            
            let users = JSON.parse(localStorage.getItem('shadowverse_users') || '[]');
            const index = users.findIndex(u => u.email === currentUser.email);
            
            const userData = {
                ...(users[index] || {}),
                name: name,
                email: currentUser.email,
                phone: document.getElementById('phone').value,
                birthday: document.getElementById('birthday').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                maritalStatus: document.getElementById('marital').value,
                employment: document.getElementById('employment').value,
                company: document.getElementById('company').value,
                position: document.getElementById('position').value,
                education: document.getElementById('education').value,
                institution: document.getElementById('institution').value,
                passYear: document.getElementById('passYear').value,
                currentAddress: document.getElementById('currentAddress').value,
                district: document.getElementById('district').value,
                division: document.getElementById('division').value,
                country: document.getElementById('country').value,
                bio: document.getElementById('bio').value,
                website: document.getElementById('website').value,
                avatarDataUrl: avatarDataUrl,
                coverDataUrl: coverDataUrl
            };
            
            if(index !== -1) users[index] = userData;
            else users.push(userData);
            localStorage.setItem('shadowverse_users', JSON.stringify(users));
            
            currentUser.name = name;
            localStorage.setItem('shadowverse_user', JSON.stringify(currentUser));
            
            showMessage('✅ প্রোফাইল সংরক্ষণ করা হয়েছে!', 'success');
            setTimeout(() => { window.location.href = 'profile.html'; }, 1000);
        }
        
        loadUser();
    </script>
</body>
</html>
